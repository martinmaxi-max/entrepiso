<style>
  :root{
    --bg:#15171a; --panel:#1f2329; --panel2:#252a31; --border:#333941; --accent:#e07b2a;
    --navy:#1e3a5f; --navy-light:#2d5a8f; --text:#e8eaed; --muted:#878d96;
    --success:#4caf7d; --danger:#e0524f; --warning:#d4a017; --info:#5b9bd5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,Segoe UI,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
  input,select{background:#15171a;color:var(--text);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-size:13px;outline:none;width:100%;font-family:inherit}
  input:focus,select:focus{border-color:var(--accent)}
  input::placeholder{color:var(--muted)}
  select option{background:var(--panel)}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:5px;font-weight:600}
  .btn{background:var(--accent);color:#fff;padding:9px 16px;font-size:13px}
  .btn:hover{background:#c96b1a}
  .btn-sm{padding:5px 11px;font-size:12px}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--muted)}
  .btn-danger{background:#3a1a1a;color:var(--danger);border:1px solid #5a2a2a}
  .btn-success{background:#16321f;color:var(--success);border:1px solid #235038}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th{color:var(--muted);font-weight:500;text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  td{padding:10px 12px;border-bottom:1px solid #23272d;vertical-align:middle}
  tr:hover td{background:var(--panel2)}
  tfoot td{border-top:2px solid var(--border);border-bottom:none}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:8px}
  .muted{color:var(--muted)}
  .badge{padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;display:inline-block;white-space:nowrap}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(circle at 50% 30%, #1f2329 0%, #15171a 70%)}
  .login-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:36px 32px;width:100%;max-width:380px;text-align:center}
  .login-logo{width:84px;height:84px;border-radius:50%;margin:0 auto 18px;display:block;box-shadow:0 4px 24px rgba(0,0,0,.4)}

  /* HEADER */
  header{background:var(--panel);border-bottom:1px solid var(--border);padding:0 22px;position:sticky;top:0;z-index:50}
  .hrow{display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand img{width:40px;height:40px;border-radius:50%}
  .brand .bn{font-weight:800;font-size:15px;letter-spacing:.02em}
  .brand .bs{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.18em;margin-top:-1px}
  .tabs{display:flex;gap:2px;overflow-x:auto}
  .tab{padding:9px 15px;background:transparent;color:var(--muted);border-bottom:2px solid transparent;font-weight:500;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:7px}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
  .wrap{padding:22px;max-width:1320px;margin:0 auto}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:20px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:15px 18px}
  .stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
  .stat .val{font-size:21px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat .sub{font-size:11px;color:var(--muted);margin-top:4px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .toolbar h2{font-size:16px;font-weight:700}
  .toolbar .sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400}
  .field{margin-bottom:13px;text-align:left}
  .field-lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;width:100%;max-width:540px;max-height:92vh;overflow:auto}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px}
  .modal-body{padding:20px}
  .modal-x{background:none;color:var(--muted);font-size:22px;line-height:1}
  .alert{border-radius:8px;padding:13px 16px;margin-bottom:16px;font-size:13px;line-height:1.5}
  .alert-warn{background:#3a2a15;border:1px solid rgba(212,160,23,.4)}
  .alert-ok{background:#16321f;border:1px solid rgba(76,175,125,.4)}
  .empty{text-align:center;color:var(--muted);padding:42px}
  .seg{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
  .seg button{flex:1;min-width:90px;padding:9px;border-radius:6px;font-weight:600;font-size:12px;border:1px solid var(--border);background:transparent;color:var(--muted)}
  .socio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:20px}
  .socio-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;border-top:3px solid var(--navy)}
  .socio-card .nm{font-weight:700;font-size:15px;margin-bottom:3px}
  .socio-card .tot{font-size:24px;font-weight:800;color:var(--success);font-variant-numeric:tabular-nums;margin:8px 0 4px}
  .conc-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:720px){.conc-row{grid-template-columns:1fr}}
  .check-pend{cursor:pointer;width:18px;height:18px;border-radius:4px;border:2px solid var(--border);display:inline-flex;align-items:center;justify-content:center;background:transparent}
  .check-pend.done{background:var(--success);border-color:var(--success);color:#fff}
</style>
</head>

// Modelo: Ingresos y Gastos como planillas madre. Cada movimiento marca
// si toca CAJA (conciliada) o BANCO (saldo manual). E-cheques con proyección
// por día. Socios con 3 subcuentas (aportes − retiros). Cuentas de egreso
// administrables (Bienes de Uso con ficha propia). Resumen por centro de costo.

const SOCIOS = ["Maximiliano Martín", "Sergio Pringles", "Gastón Turcato"];
// Centros de costo: administrables, viven en DB. Helper para leerlos.
function centrosCosto() {
  const d = DB.get();
  if (!d.centrosCosto || !d.centrosCosto.length) { d.centrosCosto = ["General"]; DB.save(); }
  return d.centrosCosto;
}
function listaProveedores() { const d = DB.get(); if (!d.proveedores) { d.proveedores = []; DB.save(); } return d.proveedores; }
function listaClientes() { const d = DB.get(); if (!d.clientes) { d.clientes = []; DB.save(); } return d.clientes; }
// Cada proveedor/cliente puede ser string (modelo viejo) u objeto {razonSocial,cuit,domicilio,telefono}
const nombreDe = x => typeof x === "string" ? x : (x.razonSocial || "");
function nombresLista(lista) { return lista.map(nombreDe); }
function buscarEnLista(lista, nombre) { return lista.find(x => nombreDe(x) === nombre); }

// CAPA DE DATOS

// ═══ CAPA DE DATOS SOBRE FIRESTORE ═══
// Todo el estado vive en un único documento: entrepiso/estado
// _data en memoria (síncrono como antes); cada save() lo sube; onSnapshot refresca todas las máquinas.
const DB = {
  _data: null,
  _docRef: null,
  _default() {
    return {
      centrosCosto: ["General"], proveedores: [], clientes: [], tiposGasto: [...TIPOS_GASTO_BASE],
      ingresos: [], gastos: [], cheques: [], ajustesCaja: [],
      saldoInicialCaja: 0, saldoBancoManual: 0, saldoBancoFecha: "",
    };
  },
  _subscribe() {
    const { db, doc, onSnapshot } = window.FB;
    this._docRef = doc(db, "entrepiso", "estado");
    onSnapshot(this._docRef, snap => {
      if (snap.exists()) this._data = snap.data();
      else { this._data = this._default(); this._pushRemote(); }
      render();
    }, err => { console.error("Firestore:", err); });
  },
  async _pushRemote() {
    try { await window.FB.setDoc(this._docRef, JSON.parse(JSON.stringify(this._data))); }
    catch (e) { console.error("Error guardando:", e); alert("No se pudo guardar en la nube. Revisá tu conexión."); }
  },
  load() { if (!this._data) this._data = this._default(); return this._data; },
  save() { this._pushRemote(); },
  get() { return this._data || this._default(); },
  add(coll, obj) { obj.id = uid(); this.get()[coll].push(obj); this.save(); return obj; },
  update(coll, id, patch) { const it = this.get()[coll].find(x => x.id === id); if (it) { Object.assign(it, patch); this.save(); } return it; },
  remove(coll, id) {
    const d = this.get();
    d[coll] = d[coll].filter(x => x.id !== id);
    if (coll === "gastos") d.cheques = d.cheques.filter(c => c.refGasto !== id);
    if (coll === "ingresos") d.cheques = d.cheques.filter(c => c.refIngreso !== id);
    this.save();
  },
  setMeta(k, v) { this.get()[k] = v; this.save(); },
};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const fmt = n => new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS", maximumFractionDigits: 0 }).format(n || 0);
const fmtF = s => s ? new Date(s + "T00:00:00").toLocaleDateString("es-AR") : "—";
const esc = s => ("" + (s ?? "")).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const today = () => new Date().toISOString().slice(0, 10);
const proyectoLabel = p => !p ? `<span style="color:var(--muted)">—</span>` : esc(p.split(" ")[0]);
// describe cómo entró un ingreso (a partir de su reparto de cobros)
function viaIngreso(i) {
  if (i.cobros && i.cobros.length) {
    const m = { efectivo: "Caja", transferencia: "Banco", echeque: "E-cheque", ctacte: "Pendiente" };
    return [...new Set(i.cobros.map(c => m[c.forma] || c.forma))].join(", ");
  }
  return i.destino === "caja" ? "Caja" : "Banco";
}

// CÁLCULOS
// ════════════════════════════════════════════════════════════════════════
// CAJA: conciliada. saldo = inicial + ingresos a caja − gastos en efectivo + ajustes
function saldoCaja() {
  const d = DB.get();
  let s = d.saldoInicialCaja || 0;
  d.ingresos.forEach(i => {
    if (i.cobros && i.cobros.length) { s += i.cobros.filter(c => c.forma === "efectivo").reduce((a, c) => a + c.importe, 0); }
    else if (i.destino === "caja") s += i.importe;
  });
  d.gastos.forEach(g => { s -= montoPorForma(g, "efectivo"); });
  (d.ajustesCaja || []).forEach(a => s += a.importe);
  return s;
}
// suma cuánto de un gasto se pagó con una forma dada (soporta pagos mixtos y modelo viejo)
function montoPorForma(g, forma) {
  if (g.pagos && g.pagos.length) return g.pagos.filter(p => p.forma === forma).reduce((a, p) => a + p.importe, 0);
  // modelo viejo: forma única
  if (g.forma === forma && g.estado === "pagado") return g.importe;
  return 0;
}
// cuánto queda pendiente (cta cte) de un gasto — soporta pagos mixtos y modelo viejo
function pendienteDe(g) {
  if (g.pagos && g.pagos.length) return g.estado === "pendiente" ? (g.montoPendiente || 0) : 0;
  return g.estado === "pendiente" ? g.importe : 0;
}
// BANCO: saldo 100% manual
function saldoBanco() { return DB.get().saldoBancoManual || 0; }
function chequesPendientes() { return DB.get().cheques.filter(c => c.estado === "pendiente"); }
// tipo por defecto "emitido" para compatibilidad con cheques viejos
function chequeEsRecibido(c) { return c.tipo === "recibido"; }
function chequesEmitidosPend() { return chequesPendientes().filter(c => !chequeEsRecibido(c)); }
function chequesRecibidosPend() { return chequesPendientes().filter(c => chequeEsRecibido(c)); }
function totalEmitidosPend() { return chequesEmitidosPend().reduce((a, c) => a + c.importe, 0); }
function totalRecibidosPend() { return chequesRecibidosPend().reduce((a, c) => a + c.importe, 0); }
function chequesPendientesTotal() { return totalEmitidosPend(); } // compat: lo "a cubrir" son los emitidos
// saldo proyectado = saldo real − emitidos pendientes + recibidos pendientes
function saldoBancoProyectado() { return saldoBanco() - totalEmitidosPend() + totalRecibidosPend(); }

// Proyección por día: cada cheque pendiente con su signo (emitido resta, recibido suma)
function proyeccionBanco() {
  const pend = chequesPendientes().filter(c => c.fechaPago).sort((a, b) => a.fechaPago.localeCompare(b.fechaPago));
  const porDia = {};
  pend.forEach(c => { (porDia[c.fechaPago] = porDia[c.fechaPago] || []).push(c); });
  let saldo = saldoBanco();
  return Object.keys(porDia).sort().map(fecha => {
    const items = porDia[fecha];
    const egresos = items.filter(c => !chequeEsRecibido(c)).reduce((a, c) => a + c.importe, 0);
    const ingresos = items.filter(c => chequeEsRecibido(c)).reduce((a, c) => a + c.importe, 0);
    const totalDia = ingresos - egresos; // neto del día
    const saldoAntes = saldo;
    saldo += totalDia;
    return { fecha, items, egresos, ingresos, totalDia, saldoAntes, saldoDespues: saldo, cubrir: saldo < 0 ? -saldo : 0 };
  });
}

// SOCIOS: aportes (ingresos tipo aporte) − retiros (gastos tipo retiro)
function socioResumen(nombre) {
  const d = DB.get();
  let aportes = 0, retiros = 0, ultimaFecha = "";
  d.ingresos.forEach(i => { if (i.tipo === "Aportes Socios" && i.socio === nombre) { aportes += i.importe; if ((i.fecha || "") > ultimaFecha) ultimaFecha = i.fecha; } });
  d.gastos.forEach(g => { if (g.tipo === "Retiros" && g.socio === nombre) { retiros += g.importe; if ((g.fecha || "") > ultimaFecha) ultimaFecha = g.fecha; } });
  return { aportes, retiros, neto: aportes - retiros, ultimaFecha };
}
function deudaProveedores() {
  return DB.get().gastos.reduce((a, g) => a + pendienteDe(g), 0);
}
// CLIENTES: cuentas por cobrar (cobranzas con parte en cta cte)
function porCobrarTotal() {
  return DB.get().ingresos.reduce((a, i) => a + (i.estado === "pendiente" ? (i.montoPendiente || 0) : 0), 0);
}
function clienteResumen(nombre) {
  const d = DB.get();
  let facturado = 0, pendiente = 0, ultimaFecha = "";
  d.ingresos.forEach(i => {
    if (i.tipo === "Cobranzas" && i.cliente === nombre) {
      facturado += i.importe;
      if (i.estado === "pendiente") pendiente += (i.montoPendiente || 0);
      if ((i.fecha || "") > ultimaFecha) ultimaFecha = i.fecha;
    }
  });
  return { facturado, pendiente, ultimaFecha };
}

// Genera impacto de un gasto (cheques) al confirmarse
function generarCheques(g) {
  // junta cheques de las líneas de pago (modelo nuevo) o del campo viejo
  let lista = [];
  if (g.pagos && g.pagos.length) {
    g.pagos.forEach(p => { if (p.forma === "echeque" && p.cheques) lista = lista.concat(p.cheques); });
  } else if (g.forma === "echeque" && g.cheques) {
    lista = g.cheques;
  }
  lista.forEach(c => {
    if (!DB.get().cheques.some(x => x.refGasto === g.id && x.nro === c.nro && x.fechaPago === c.fechaPago && x.importe === c.importe)) {
      DB.add("cheques", { tipo: "emitido", fechaEmision: g.fecha, fechaPago: c.fechaPago, nro: c.nro, beneficiario: g.proveedor || g.tipo, importe: c.importe, refGasto: g.id, estado: "pendiente" });
    }
  });
}

function saveIngreso() {
  const imp = parseFloat(document.getElementById("i_imp").value || 0); if (!imp) return;
  const tipo = document.getElementById("i_tipo").value;
  const o = { fecha: document.getElementById("i_fecha").value, tipo, importe: imp, proyecto: document.getElementById("i_proy").value, detalle: document.getElementById("i_det").value.trim() };
  if (tipo === "Aportes Socios") o.socio = document.getElementById("i_socio").value;
  else if (tipo === "Cobranzas") {
    const c = document.getElementById("i_cliente"); if (c && c.value && c.value !== "__nuevo__") o.cliente = c.value.trim();
    const ft = document.getElementById("i_factipo"); if (ft) o.facturaTipo = ft.value;
    const fn = document.getElementById("i_facnro"); if (fn) o.facturaNro = fn.value.trim();
  }
  // reparto en cobros (los tres tipos): lo no asignado queda pendiente en cta cte
  const asignado = cobrosTemp.reduce((a, x) => a + x.importe, 0);
  const cobros = cobrosTemp.map(x => ({ ...x }));
  const pendiente = imp - asignado;
  if (pendiente > 0.5) cobros.push({ forma: "ctacte", importe: pendiente });
  o.cobros = cobros;
  o.montoPendiente = pendiente > 0.5 ? pendiente : 0;
  o.estado = pendiente > 0.5 ? "pendiente" : "cobrado";
  o.destino = cobros.some(x => x.forma === "efectivo") ? "caja" : "banco";
  // generar cheques recibidos si hubo e-cheque en el reparto
  if (window._editIngresoId) {
    const dd = DB.get(); dd.cheques = dd.cheques.filter(ch => ch.refIngreso !== window._editIngresoId); DB.save();
    DB.update("ingresos", window._editIngresoId, o);
    generarChequesRecibidos(DB.get().ingresos.find(x => x.id === window._editIngresoId));
    window._editIngresoId = null;
  } else {
    const saved = DB.add("ingresos", o);
    generarChequesRecibidos(saved);
  }
  cobrosTemp = []; chequesTemp = [];
  closeModal(); render();
}
// genera cheques recibidos a partir de las líneas e-cheque de un ingreso
function generarChequesRecibidos(ing) {
  if (!ing || !ing.cobros) return;
  ing.cobros.forEach(c => {
    if (c.forma === "echeque" && c.cheques) {
      c.cheques.forEach(ch => {
        if (!DB.get().cheques.some(x => x.refIngreso === ing.id && x.nro === ch.nro && x.fechaPago === ch.fechaPago && x.importe === ch.importe)) {
          DB.add("cheques", { tipo: "recibido", fechaEmision: ing.fecha, fechaPago: ch.fechaPago, nro: ch.nro, beneficiario: ing.cliente || ing.socio || "Cobro", importe: ch.importe, refIngreso: ing.id, estado: "pendiente" });
        }
      });
    }
  });
}

function gTipoChange() {
  const sel = document.getElementById("g_tipo");
  // opción "+ Nueva cuenta…": crear una cuenta de egreso en el momento
  if (sel.value === "__nueva__") {
    const v = prompt("Nombre de la nueva cuenta de egreso:");
    if (v && v.trim()) {
      const nombre = v.trim();
      const d = DB.get(); if (!d.tiposGasto || !d.tiposGasto.length) d.tiposGasto = [...TIPOS_GASTO_BASE];
      if (!d.tiposGasto.includes(nombre)) { d.tiposGasto.push(nombre); DB.save(); }
      const o = document.createElement("option"); o.text = nombre; o.selected = true;
      sel.add(o, sel.options[sel.options.length - 1]);
    } else { sel.selectedIndex = 0; }
  }
  const t = sel.value;
  const ex = document.getElementById("g_tipoextra");
  if (t === "Proveedores") ex.innerHTML = `<div class="field"><label class="field-lbl">Proveedor</label>${selectConNuevo("g_prov", listaProveedores(), "", "proveedores")}</div>`;
  else if (t === "Retiros") ex.innerHTML = `<div class="field"><label class="field-lbl">¿Qué socio retira?</label><select id="g_socio">${SOCIOS.map(s => `<option>${s}</option>`).join("")}</select></div>`;
  else if (t === "Bienes de Uso") ex.innerHTML = `
    <div class="field"><label class="field-lbl">Proveedor</label>${selectConNuevo("g_prov", listaProveedores(), "", "proveedores")}</div>
    <div style="border:1px solid var(--border);border-radius:8px;padding:14px;background:var(--panel2);margin-bottom:13px">

      <div class="field" style="margin-bottom:8px"><label class="field-lbl">¿Qué bien es?</label><input id="g_bien_desc" placeholder="Ej: hormigonera 130L, camioneta, andamios..."></div>
      <div class="grid2">
        <div class="field" style="margin-bottom:0"><label class="field-lbl">Marca / modelo</label><input id="g_bien_marca" placeholder="Opcional"></div>
        <div class="field" style="margin-bottom:0"><label class="field-lbl">Nro. serie / patente</label><input id="g_bien_serie" placeholder="Opcional"></div>
      </div>
    </div>`;
  else ex.innerHTML = "";
}

function currentList() {
  if (adminSección === "proveedores") return listaProveedores();
  if (adminSección === "clientes") return listaClientes();
  if (adminSección === "cuentas") return tiposGasto();
  return centrosCosto();
}
function renderAdmList() {
  const cont = document.getElementById("adm_list"); if (!cont) return;
  const lista = currentList();
  if (lista.length === 0) { cont.innerHTML = `<div class="muted" style="font-size:12px;text-align:center;padding:16px">Todavía no cargaste nada.</div>`; return; }
  if (adminSección === "centros" || adminSección === "cuentas") {
    const esCuentas = adminSección === "cuentas";
    const fijas = esCuentas ? ["Proveedores", "Retiros", "Bienes de Uso"] : ["General"];
    const delFn = esCuentas ? "admDelCuenta" : "admDelCentro";
    cont.innerHTML = `<div style="max-height:240px;overflow:auto">` + lista.map((c, i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px">
        <span>${esc(c)}</span>
        ${fijas.includes(c) ? `<span class="muted" style="font-size:11px">fijo</span>` : `<button class="btn-danger btn btn-sm" onclick="${delFn}(${i})">×</button>`}

  } else {
    cont.innerHTML = `<div style="max-height:240px;overflow:auto">` + lista.map((c, i) => {

      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px">
        <div><div style="font-weight:600">${esc(o.razonSocial)}</div>${datos ? `<div class="muted" style="font-size:11px">${esc(datos)}</div>` : ""}</div>
        <div style="display:flex;gap:6px"><button class="btn-ghost btn btn-sm" onclick="admEditEntidad(${i})">✎</button><button class="btn-danger btn btn-sm" onclick="admDelEntidad(${i})">×</button></div>
      </div>`;

}
function admAddCentro() {
  const inp = document.getElementById("adm_nuevo");
  const v = inp.value.trim(); if (!v) return;
  const d = DB.get(); if (!d.centrosCosto) d.centrosCosto = ["General"];
  if (d.centrosCosto.includes(v)) { alert("Ya existe."); return; }
  d.centrosCosto.push(v); DB.save(); inp.value = ""; renderAdmList();
}
function admDelCentro(i) {
  const d = DB.get(); const nombre = d.centrosCosto[i];
  if (nombre === "General") return;
  const enUso = d.ingresos.some(x => x.proyecto === nombre) || d.gastos.some(x => x.proyecto === nombre);
  if (enUso && !confirm(`"${nombre}" tiene movimientos. ¿Eliminar de la lista igual?`)) return;
  d.centrosCosto.splice(i, 1); DB.save(); renderAdmList();
}
function admAddCuenta() {
  const inp = document.getElementById("adm_nuevo");
  const v = inp.value.trim(); if (!v) return;
  const d = DB.get(); if (!d.tiposGasto || !d.tiposGasto.length) d.tiposGasto = [...TIPOS_GASTO_BASE];
  if (d.tiposGasto.includes(v)) { alert("Ya existe."); return; }
  d.tiposGasto.push(v); DB.save(); inp.value = ""; renderAdmList();
}
function admDelCuenta(i) {
  const d = DB.get(); const nombre = d.tiposGasto[i];
  if (["Proveedores", "Retiros", "Bienes de Uso"].includes(nombre)) return;
  const enUso = d.gastos.some(x => x.tipo === nombre);
  if (enUso && !confirm(`"${nombre}" tiene egresos cargados. ¿Eliminar de la lista igual? (los egresos ya cargados no se pierden)`)) return;
  d.tiposGasto.splice(i, 1); DB.save(); renderAdmList();
}
function admAddEntidad() {
  const razon = document.getElementById("ent_razon").value.trim();
  if (!razon) { alert("Poné al menos la razón social."); return; }
  const obj = { razonSocial: razon, cuit: document.getElementById("ent_cuit").value.trim(), telefono: document.getElementById("ent_tel").value.trim(), domicilio: document.getElementById("ent_dom").value.trim() };
  const key = adminSección;
  const d = DB.get(); if (!d[key]) d[key] = [];
  if (window._admEditIdx != null) {
    // editar: reemplazar en su lugar
    d[key][window._admEditIdx] = obj; DB.save();
    window._admEditIdx = null;
  } else {
    if (d[key].some(x => nombreDe(x) === razon)) { alert("Ya existe ese nombre."); return; }
    d[key].push(obj); DB.save();
  }
  ["ent_razon", "ent_cuit", "ent_tel", "ent_dom"].forEach(id => { const e = document.getElementById(id); if (e) e.value = ""; });
  const btn = document.getElementById("ent_btn"); if (btn) btn.textContent = "+ Agregar";
  renderAdmList();
}
function admEditEntidad(i) {
  const d = DB.get(); const o = d[adminSección][i];
  const obj = typeof o === "string" ? { razonSocial: o } : o;
  window._admEditIdx = i;
  document.getElementById("ent_razon").value = obj.razonSocial || "";
  document.getElementById("ent_cuit").value = obj.cuit || "";
  document.getElementById("ent_tel").value = obj.telefono || "";
  document.getElementById("ent_dom").value = obj.domicilio || "";
  const btn = document.getElementById("ent_btn"); if (btn) btn.textContent = "Guardar cambios";
  document.getElementById("ent_razon").focus();
}
function admDelEntidad(i) {
  const d = DB.get(); const key = adminSección;
  const nombre = nombreDe(d[key][i]);
  const enUso = key === "proveedores" ? d.gastos.some(x => x.proveedor === nombre) : d.ingresos.some(x => x.cliente === nombre);
  if (enUso && !confirm(`"${nombre}" tiene movimientos. ¿Eliminar de la lista igual?`)) return;
  d[key].splice(i, 1); DB.save(); renderAdmList();
}

// Helper: select con opción "+ Nuevo" para proveedores/clientes/centros
function selectConNuevo(id, lista, valorActual, tipo) {
  const nombres = nombresLista(lista);
  const opts = nombres.map(x => `<option ${x === valorActual ? "selected" : ""}>${esc(x)}</option>`).join("");
  // tipo: "proveedores" | "clientes" → abre modal de alta completa. Sin tipo → prompt simple.
  const onChange = tipo
    ? `if(this.value==='__nuevo__'){this.selectedIndex=0;openNuevaEntidad('${tipo}','${id}');}`
    : `if(this.value==='__nuevo__'){const v=prompt('Nombre nuevo:');if(v){const o=document.createElement('option');o.text=v;o.selected=true;this.add(o,this.options[this.options.length-1]);}else{this.selectedIndex=0;}}`;
  return `<select id="${id}" onchange="${onChange}">
    ${nombres.length === 0 ? `<option value="">— sin cargar —</option>` : ""}${opts}<option value="__nuevo__">+ Nuevo…</option></select>`;
}
// Alta rápida de proveedor/cliente desde el proceso de carga, con datos completos
function openNuevaEntidad(tipo, selectId) {
  const ent = tipo === "proveedores" ? "proveedor" : "cliente";
  window._nuevaEntCtx = { tipo, selectId };
  modalHTML2(`
    <p class="muted" style="font-size:13px;margin-bottom:14px">Nuevo ${ent} — se guarda en la lista y queda seleccionado.</p>
    <div class="field"><label class="field-lbl">Razón social</label><input id="ne_razon" placeholder="Razón social"></div>
    <div class="grid2">
      <div class="field"><label class="field-lbl">CUIT</label><input id="ne_cuit" placeholder="20-12345678-9"></div>
      <div class="field"><label class="field-lbl">Teléfono</label><input id="ne_tel" placeholder="Contacto"></div>
    </div>
    <div class="field"><label class="field-lbl">Domicilio</label><input id="ne_dom" placeholder="Domicilio"></div>
  `, "Nuevo " + ent, "guardarNuevaEntidad()");
}
function guardarNuevaEntidad() {
  const { tipo, selectId } = window._nuevaEntCtx || {};
  const razon = document.getElementById("ne_razon").value.trim();
  if (!razon) { alert("Poné al menos la razón social."); return; }
  const obj = { razonSocial: razon, cuit: document.getElementById("ne_cuit").value.trim(), telefono: document.getElementById("ne_tel").value.trim(), domicilio: document.getElementById("ne_dom").value.trim() };
  const d = DB.get(); if (!d[tipo]) d[tipo] = [];
  if (!d[tipo].some(x => nombreDe(x) === razon)) { d[tipo].push(obj); DB.save(); }
  closeModal2();
  // re-seleccionar en el select original (que sigue en el modal de abajo)
  const sel = document.getElementById(selectId);
  if (sel) {
    if (![...sel.options].some(o => o.text === razon)) {
      const o = document.createElement("option"); o.text = razon;
      sel.add(o, sel.options[sel.options.length - 1]);
    }
    sel.value = razon;
  }
}


// pagosTemp: [{forma, importe, cheques?:[{nro,fechaPago,importe}]}]
let pagosTemp = [];
// ── Panel de cobros para ingresos (cobranza mixta de facturas) ──
let cobrosTemp = [];
const FORMAS_COBRO = [

];
function cobroLabel(id) { return (FORMAS_COBRO.find(f => f.id === id) || {}).label || id; }
function renderCobros() {
  const cont = document.getElementById("i_cobros"); if (!cont) return;
  const impTotal = parseFloat((document.getElementById("i_imp") || {}).value || 0);

          <td style="padding:5px 6px">${cobroLabel(c.forma)}</td>

        <span>Cobrado: <b>${fmt(asignado)}</b></span>

      </div>
      <div class="grid2" style="gap:8px;align-items:end">
        <div class="field" style="margin:0"><label class="field-lbl">Forma de cobro</label><select id="cb_forma" onchange="cbFormaChange()">${FORMAS_COBRO.filter(f => f.id !== "ctacte").map(f => `<option value="${f.id}">${f.label}</option>`).join("")}</select></div>

      <div id="cb_cheques" style="margin-top:10px"></div>
      <button class="btn btn-sm" style="margin-top:10px;width:100%" onclick="addCobro()">+ Agregar cobro</button>
    </div>`;
  cbFormaChange();
}
function cbFormaChange() {
  const fEl = document.getElementById("cb_forma"); if (!fEl) return;
  const f = fEl.value;
  const chq = document.getElementById("cb_cheques");
  const montoWrap = document.getElementById("cb_montowrap");
  if (f === "echeque") { chequesTemp = []; if (montoWrap) montoWrap.style.visibility = "hidden"; if (chq) { chq.innerHTML = chequesPanelHTML("cb"); renderChequesTemp("cb"); } }
  else { if (montoWrap) montoWrap.style.visibility = "visible"; if (chq) chq.innerHTML = ""; }
}
function addCobro() {
  const f = document.getElementById("cb_forma").value;
  if (f === "echeque") {
    if (chequesTemp.length === 0) { alert("Agregá al menos un e-cheque a esta línea."); return; }
    const tot = chequesTemp.reduce((a, c) => a + c.importe, 0);
    cobrosTemp.push({ forma: "echeque", importe: tot, cheques: chequesTemp.map(c => ({ ...c })) });
    chequesTemp = [];
  } else {
    const m = parseFloat(document.getElementById("cb_monto").value || 0);
    if (!m) return;
    cobrosTemp.push({ forma: f, importe: m });
  }
  renderCobros();
}

      `<table style="font-size:12px;margin-bottom:10px"><tbody>
        ${pagosTemp.map((p, i) => `<tr>
          <td style="padding:5px 6px">${formaPagoLabel(p.forma)}</td>

      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)">
        <span>Asignado: <b>${fmt(asignado)}</b></span>
        <span style="color:${Math.abs(resta) < 1 ? 'var(--success)' : 'var(--warning)'}">${Math.abs(resta) < 1 ? '✓ completo' : 'falta asignar: ' + fmt(resta)}</span>
      </div>
      <div class="grid2" style="gap:8px;align-items:end">
        <div class="field" style="margin:0"><label class="field-lbl">Forma</label><select id="pg_forma" onchange="pgFormaChange()">${FORMAS_PAGO.map(f => `<option value="${f.id}">${f.label}</option>`).join("")}</select></div>
        <div class="field" style="margin:0" id="pg_montowrap"><label class="field-lbl">Monto ($)</label><input id="pg_monto" type="number" placeholder="${resta > 0 ? resta : 0}"></div>
      </div>
      <div id="pg_cheques" style="margin-top:10px"></div>
      <button class="btn btn-sm" style="margin-top:10px;width:100%" onclick="addPago()">+ Agregar esta forma de pago</button>
    </div>`;
  pgFormaChange();
}
function pgFormaChange() {
  const fEl = document.getElementById("pg_forma"); if (!fEl) return;
  const f = fEl.value;
  const chq = document.getElementById("pg_cheques");
  const montoWrap = document.getElementById("pg_montowrap");
  if (f === "echeque") {
    // para e-cheque, el monto sale de la suma de cheques; ocultamos el monto manual
    chequesTemp = [];
    montoWrap.style.visibility = "hidden";
    chq.innerHTML = chequesPanelHTML("pg");
    renderChequesTemp("pg");
  } else {
    montoWrap.style.visibility = "visible";
    chq.innerHTML = "";
  }
}
function addPago() {
  const f = document.getElementById("pg_forma").value;
  if (f === "echeque") {
    if (chequesTemp.length === 0) { alert("Agregá al menos un e-cheque a esta línea."); return; }
    const tot = chequesTemp.reduce((a, c) => a + c.importe, 0);
    pagosTemp.push({ forma: "echeque", importe: tot, cheques: chequesTemp.map(c => ({ ...c })) });
    chequesTemp = [];
  } else {
    const m = parseFloat(document.getElementById("pg_monto").value || 0);
    if (!m) return;
    pagosTemp.push({ forma: f, importe: m });
  }
  renderPagos();
}
function delPago(i) { pagosTemp.splice(i, 1); renderPagos(); }
function formaPagoLabel(id) { return (FORMAS_PAGO.find(f => f.id === id) || {}).label || id; }

function saveGasto() {
  const impTotal = parseFloat(document.getElementById("g_imp").value || 0);
  const tipo = document.getElementById("g_tipo").value;
  if (tipo === "__nueva__") { alert("Elegí una cuenta para el egreso."); return; }
  const provEl = document.getElementById("g_prov");
  let proveedor = (provEl && provEl.value !== "__nuevo__") ? provEl.value.trim() : "";
  if (pagosTemp.length === 0) { alert("Agregá al menos una forma de pago."); return; }
  const asignado = pagosTemp.reduce((a, p) => a + p.importe, 0);
  const importe = impTotal || asignado;
  if (Math.abs(importe - asignado) > 1) { alert("El total asignado en las formas de pago (" + fmt(asignado) + ") no coincide con el importe (" + fmt(importe) + ")."); return; }
  // estado: pendiente si hay alguna parte en ctacte; si todo lo demás está pago, queda 'pagado' salvo que tenga ctacte
  const tieneCtaCte = pagosTemp.some(p => p.forma === "ctacte");
  const facTipoEl = document.getElementById("g_factipo");
  const facNroEl = document.getElementById("g_facnro");
  const g = {
    fecha: document.getElementById("g_fecha").value, tipo,
    proveedor: proveedor || (tipo !== "Proveedores" && tipo !== "Bienes de Uso" ? tipo : ""),
    facturaTipo: facTipoEl ? facTipoEl.value : "",
    facturaNro: facNroEl ? facNroEl.value.trim() : "",
    concepto: document.getElementById("g_conc").value.trim(),
    proyecto: document.getElementById("g_proy").value,
    importe,
    pagos: pagosTemp.map(p => ({ ...p })),
    estado: tieneCtaCte ? "pendiente" : "pagado",
    montoPendiente: pagosTemp.filter(p => p.forma === "ctacte").reduce((a, p) => a + p.importe, 0),
  };
  const socEl = document.getElementById("g_socio");
  if (tipo === "Retiros" && socEl) g.socio = socEl.value;
  // ficha del bien de uso
  if (tipo === "Bienes de Uso") {
    const descEl = document.getElementById("g_bien_desc");
    const desc = descEl ? descEl.value.trim() : "";
    if (!desc) { alert("Indicá qué bien de uso estás cargando (ej: hormigonera, camioneta, andamios)."); return; }
    const gv = id => { const el = document.getElementById(id); return el ? el.value.trim() : ""; };
    g.bien = { descripcion: desc, marca: gv("g_bien_marca"), serie: gv("g_bien_serie") };
  } else {
    g.bien = undefined;
  }
  if (window._editGastoId) {
    // borrar cheques viejos de este gasto y actualizar
    const dd = DB.get();
    dd.cheques = dd.cheques.filter(c => c.refGasto !== window._editGastoId);
    DB.save();
    DB.update("gastos", window._editGastoId, g);
    const upd = DB.get().gastos.find(x => x.id === window._editGastoId);
    generarCheques(upd);
    window._editGastoId = null;
  } else {
    const saved = DB.add("gastos", g);
    generarCheques(saved);
  }
  pagosTemp = []; chequesTemp = [];
  closeModal(); render();
}
// Saldar la parte pendiente (cta cte) de un gasto
function openSaldarModal(id) {
  const g = DB.get().gastos.find(x => x.id === id); if (!g) return;
  const pendiente = (g.pagos && g.pagos.length) ? (g.montoPendiente || 0) : g.importe;
  window._saldarImporte = pendiente; chequesTemp = [];
  modalHTML(`
    <p class="muted" style="font-size:13px;margin-bottom:14px">Saldar la parte pendiente de <b>${esc(g.proveedor)}</b> — ${fmt(pendiente)}. ¿Con qué pagás?</p>
    <div class="field"><label class="field-lbl">Forma de pago</label><select id="s_forma" onchange="sFormaChange()">
      <option value="efectivo">Efectivo (caja)</option><option value="transferencia">Transferencia (banco)</option><option value="echeque">E-cheque(s)</option></select></div>
    <div class="field"><label class="field-lbl">Fecha de pago</label><input id="s_fecha" type="date" value="${today()}"></div>
    <div id="s_extra"></div>
  `, "Saldar gasto", "confirmSaldar('" + id + "')");
  sFormaChange();
}
function sFormaChange() {
  const f = document.getElementById("s_forma").value;
  const ex = document.getElementById("s_extra");
  if (f === "echeque") { chequesTemp = []; ex.innerHTML = chequesPanelHTML("s"); renderChequesTemp("s"); }
  else ex.innerHTML = "";
}
function confirmSaldar(id) {
  const g = DB.get().gastos.find(x => x.id === id); if (!g) return;
  const forma = document.getElementById("s_forma").value;
  const pendiente = (g.pagos && g.pagos.length) ? (g.montoPendiente || 0) : g.importe;
  // construir la nueva línea de pago que reemplaza la parte ctacte
  let nuevaLinea = { forma, importe: pendiente };
  if (forma === "echeque") {
    if (chequesTemp.length === 0) { alert("Agregá al menos un e-cheque."); return; }
    nuevaLinea.cheques = chequesTemp.map(c => ({ ...c }));
    nuevaLinea.importe = chequesTemp.reduce((a, c) => a + c.importe, 0);
  }
  // reemplazar líneas ctacte por la nueva forma
  let pagos = (g.pagos && g.pagos.length) ? g.pagos.filter(p => p.forma !== "ctacte") : [];
  pagos.push(nuevaLinea);
  DB.update("gastos", id, { pagos, estado: "pagado", montoPendiente: 0, forma: undefined, cheques: undefined });
  generarCheques(DB.get().gastos.find(x => x.id === id));
  chequesTemp = []; closeModal(); render();
}

// ── Panel multi-cheque reutilizable ──
let chequesTemp = [];
function chequesPanelHTML(pref) {
  return `<div style="border:1px solid var(--border);border-radius:8px;padding:14px;background:var(--panel2)">
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">E-cheques — cargá uno por uno, cada uno con su fecha de vencimiento</div>
    <div class="grid3" style="gap:8px;align-items:end">
      <div class="field" style="margin:0"><label class="field-lbl">Nro.</label><input id="${pref}_chq_nro" placeholder="opcional"></div>
      <div class="field" style="margin:0"><label class="field-lbl">Fecha pago</label><input id="${pref}_chq_fecha" type="date" value="${today()}"></div>
      <div class="field" style="margin:0"><label class="field-lbl">Monto ($)</label><input id="${pref}_chq_monto" type="number" placeholder="0" onkeydown="if(event.key==='Enter'){event.preventDefault();addChequeTemp('${pref}')}"></div>
    </div>
    <button class="btn btn-sm" style="margin-top:10px;width:100%" onclick="addChequeTemp('${pref}')">+ Agregar cheque a la lista</button>
    <div id="${pref}_chq_list" style="margin-top:12px"></div>
  </div>`;
}
function addChequeTemp(pref) {
  const nro = document.getElementById(pref + "_chq_nro").value.trim();
  const fechaPago = document.getElementById(pref + "_chq_fecha").value;
  const importe = parseFloat(document.getElementById(pref + "_chq_monto").value || 0);
  if (!importe || !fechaPago) return;
  chequesTemp.push({ nro, fechaPago, importe });
  document.getElementById(pref + "_chq_nro").value = ""; document.getElementById(pref + "_chq_monto").value = "";
  renderChequesTemp(pref); document.getElementById(pref + "_chq_nro").focus();
}
function delChequeTemp(pref, i) { chequesTemp.splice(i, 1); renderChequesTemp(pref); }
function renderChequesTemp(pref) {
  const cont = document.getElementById(pref + "_chq_list"); if (!cont) return;
  if (chequesTemp.length === 0) { cont.innerHTML = `<div class="muted" style="font-size:12px;text-align:center;padding:8px">Todavía no agregaste cheques.</div>`; return; }
  const totalChq = chequesTemp.reduce((a, c) => a + c.importe, 0);
  let impRef = 0;
  if (pref === "g") impRef = parseFloat((document.getElementById("g_imp") || {}).value || 0);
  else if (pref === "s") impRef = window._saldarImporte || 0;
  // pref "pg" (línea de pago mixto): no se compara contra un total
  const difer = impRef - totalChq;
  cont.innerHTML = `<table style="font-size:12px"><tbody>
    ${chequesTemp.map((c, i) => `<tr>
      <td style="padding:5px 6px;font-family:monospace;color:var(--muted)">${esc(c.nro) || "s/n"}</td>
      <td style="padding:5px 6px">${fmtF(c.fechaPago)}</td>
      <td style="padding:5px 6px;text-align:right;font-weight:600">${fmt(c.importe)}</td>
      <td style="padding:5px 6px;text-align:right"><button class="btn-danger btn btn-sm" onclick="delChequeTemp('${pref}',${i})">×</button></td>
    </tr>`).join("")}</tbody></table>
    <div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:13px">
      <span style="font-weight:700">Total cheques: ${fmt(totalChq)}</span>
      ${impRef ? `<span style="color:${Math.abs(difer) < 1 ? 'var(--success)' : 'var(--warning)'}">${Math.abs(difer) < 1 ? '✓ coincide' : 'dif: ' + fmt(difer)}</span>` : ""}
    </div>`;
}

// VISTA: CAJA (conciliada, con saldo arrastrado fila por fila)
// ════════════════════════════════════════════════════════════════════════
function viewCaja() {
  const d = DB.get();
  const filas = [];
  d.ingresos.forEach(i => {
    if (i.cobros && i.cobros.length) { const ef = i.cobros.filter(c => c.forma === "efectivo").reduce((a, c) => a + c.importe, 0); if (ef > 0) filas.push({ fecha: i.fecha, concepto: i.tipo + (i.cliente ? " · " + i.cliente : ""), detalle: i.detalle, tipo: "ingreso", importe: ef }); }
    else if (i.destino === "caja") filas.push({ fecha: i.fecha, concepto: i.tipo + (i.socio ? " · " + i.socio.split(" ")[0] : ""), detalle: i.detalle, tipo: "ingreso", importe: i.importe });
  });
  d.gastos.forEach(g => { const ef = montoPorForma(g, "efectivo"); if (ef > 0) filas.push({ fecha: g.fecha, concepto: g.tipo, detalle: g.proveedor || g.concepto, tipo: "egreso", importe: ef }); });
  (d.ajustesCaja || []).forEach(a => filas.push({ fecha: a.fecha, concepto: "Ajuste manual", detalle: a.detalle, tipo: a.importe >= 0 ? "ingreso" : "egreso", importe: Math.abs(a.importe), ajusteId: a.id }));
  // del movimiento más viejo al más nuevo, arrastrando el saldo fila por fila
  filas.sort((a, b) => (a.fecha || "").localeCompare(b.fecha || ""));
  let acum = d.saldoInicialCaja || 0;
  filas.forEach(f => { acum += (f.tipo === "ingreso" ? f.importe : -f.importe); f.saldo = acum; });
  const saldo = saldoCaja();
  const ing = filas.filter(f => f.tipo === "ingreso").reduce((a, f) => a + f.importe, 0);
  const egr = filas.filter(f => f.tipo === "egreso").reduce((a, f) => a + f.importe, 0);
  return `
    <div class="toolbar"><div><h2>Caja en efectivo</h2><div class="sub">Del movimiento más viejo al más nuevo — la columna Saldo arrastra el acumulado fila por fila.</div></div>
      <div style="display:flex;gap:8px"><button class="btn-ghost btn" onclick="setSaldoInicialCaja()">Saldo inicial</button><button class="btn-ghost btn" onclick="openAjusteCaja()">+ Ajuste</button></div></div>
    <div class="stats">
      <div class="stat"><div class="lbl">Saldo en caja</div><div class="val" style="color:${saldo >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(saldo)}</div><div class="sub">inicial: ${fmt(d.saldoInicialCaja || 0)}</div></div>
      <div class="stat"><div class="lbl">Entradas</div><div class="val" style="color:var(--success)">${fmt(ing)}</div></div>
      <div class="stat"><div class="lbl">Salidas</div><div class="val" style="color:var(--danger)">${fmt(egr)}</div></div>
    </div>
    <div class="panel" style="overflow:hidden">
      ${filas.length === 0 ? `<div class="empty">Sin movimientos de caja. Se cargan desde Ingresos y Gastos.</div>` :
      `<div style="overflow-x:auto"><table><thead><tr><th>Fecha</th><th>Concepto</th><th>Detalle</th><th class="num">Entrada</th><th class="num">Salida</th><th class="num">Saldo</th><th></th></tr></thead><tbody>
      <tr><td class="muted">—</td><td style="font-weight:600">Saldo inicial</td><td class="muted">—</td><td class="num muted">—</td><td class="num muted">—</td><td class="num" style="font-weight:700">${fmt(d.saldoInicialCaja || 0)}</td><td></td></tr>
      ${filas.map(f => `<tr>
        <td style="white-space:nowrap">${fmtF(f.fecha)}</td><td>${esc(f.concepto)}</td><td class="muted">${esc(f.detalle) || "—"}</td>
        <td class="num" style="color:var(--success)">${f.tipo === "ingreso" ? "+" + fmt(f.importe) : "—"}</td>
        <td class="num" style="color:var(--danger)">${f.tipo === "egreso" ? "−" + fmt(f.importe) : "—"}</td>
        <td class="num" style="font-weight:700;color:${f.saldo >= 0 ? 'var(--text)' : 'var(--danger)'}">${fmt(f.saldo)}</td>
        <td>${f.ajusteId ? `<button class="btn-danger btn btn-sm" onclick="DB.remove('ajustesCaja','${f.ajusteId}');render()">×</button>` : `<span class="muted" style="font-size:11px">auto</span>`}</td>
      </tr>`).join("")}
      </tbody><tfoot><tr><td colspan="5" style="font-weight:700;color:var(--accent)">SALDO FINAL</td><td class="num" style="font-weight:700;color:${saldo >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(saldo)}</td><td></td></tr></tfoot></table></div>`}
    </div>`;
}
function setSaldoInicialCaja() {
  modalHTML(`<div class="field"><label class="field-lbl">Saldo inicial de caja ($)</label><input id="sic_monto" type="number" value="${DB.get().saldoInicialCaja || 0}"></div>`, "Saldo inicial de caja", "saveSaldoInicialCaja()");
}
function saveSaldoInicialCaja() { DB.setMeta("saldoInicialCaja", parseFloat(document.getElementById("sic_monto").value || 0)); closeModal(); render(); }
function openAjusteCaja() {
  modalHTML(`<p class="muted" style="font-size:13px;margin-bottom:14px">Ajuste de conciliación: poné un monto positivo (sobra plata) o negativo (falta).</p>
    <div class="grid2"><div class="field"><label class="field-lbl">Fecha</label><input id="aj_fecha" type="date" value="${today()}"></div>
    <div class="field"><label class="field-lbl">Importe (+/−)</label><input id="aj_imp" type="number" placeholder="ej: -500 o 500"></div></div>
    <div class="field"><label class="field-lbl">Detalle</label><input id="aj_det" placeholder="Motivo del ajuste"></div>`, "Ajuste de caja", "saveAjuste()");
}
function saveAjuste() { const imp = parseFloat(document.getElementById("aj_imp").value || 0); if (!imp) return; DB.add("ajustesCaja", { fecha: document.getElementById("aj_fecha").value, importe: imp, detalle: document.getElementById("aj_det").value.trim() }); closeModal(); render(); }

// VISTA: E-CHEQUES (incluye saldo del banco)
// ════════════════════════════════════════════════════════════════════════
function setSaldoBanco() {
  const d = DB.get();
  modalHTML(`
    <p class="muted" style="font-size:13px;margin-bottom:14px">Cargá el saldo que ves en el homebanking de Credicoop. Este número es la verdad del banco — la proyección de e-cheques se calcula sobre él.</p>
    <div class="grid2">
      <div class="field"><label class="field-lbl">Saldo real ($)</label><input id="sb_monto" type="number" value="${d.saldoBancoManual || 0}"></div>
      <div class="field"><label class="field-lbl">Fecha del saldo</label><input id="sb_fecha" type="date" value="${d.saldoBancoFecha || today()}"></div>
    </div>
  `, "Actualizar saldo del banco", "saveSaldoBanco()");
}
function saveSaldoBanco() {
  const v = parseFloat(document.getElementById("sb_monto").value || 0);
  DB.setMeta("saldoBancoManual", v);
  DB.setMeta("saldoBancoFecha", document.getElementById("sb_fecha").value || today());
  closeModal(); render();
}
function viewCheques() {
  const d = DB.get();
  const emitidos = d.cheques.filter(c => !chequeEsRecibido(c)).sort((a, b) => (a.fechaPago || "").localeCompare(b.fechaPago || ""));
  const recibidos = d.cheques.filter(c => chequeEsRecibido(c)).sort((a, b) => (a.fechaPago || "").localeCompare(b.fechaPago || ""));
  const totalEmit = totalEmitidosPend(), totalReci = totalRecibidosPend();
  const real = saldoBanco(), proy = saldoBancoProyectado();
  const proyeccion = proyeccionBanco();
  const cubre = proy >= 0;
  let alerta = "";
  if (totalEmit > 0 || totalReci > 0) alerta = cubre
    ? `<div class="alert alert-ok"><b style="color:var(--success)">✓ Cubierto:</b> con saldo real ${fmt(real)}, menos ${fmt(totalEmit)} en cheques propios pendientes y más ${fmt(totalReci)} por acreditar, el proyectado es ${fmt(proy)}.</div>`
    : `<div class="alert alert-warn"><b style="color:var(--warning)">⚠ Necesitás cubrir ${fmt(Math.abs(proy))}:</b> el saldo proyectado queda negativo tras los movimientos de cheques.</div>`;

  const tablaCheques = (lista, esRecibido) => lista.length === 0
    ? `<div class="empty">No hay cheques ${esRecibido ? "recibidos" : "emitidos"}.</div>`
    : `<div style="overflow-x:auto"><table><thead><tr><th>${esRecibido ? "Acreditado" : "Pagado"}</th><th>Pago (vto)</th><th>Nro.</th><th>${esRecibido ? "Cliente" : "Beneficiario"}</th><th class="num">Importe</th><th>Estado</th></tr></thead><tbody>
      ${lista.map(c => `<tr style="${c.estado === "debitado" ? "opacity:.5" : ""}">
        <td><span class="check-pend ${c.estado === "debitado" ? "done" : ""}" onclick="toggleCheque('${c.id}')" title="Marcar como ${esRecibido ? "acreditado" : "pagado"}">${c.estado === "debitado" ? "✓" : ""}</span></td>
        <td style="white-space:nowrap;font-weight:600">${fmtF(c.fechaPago)}</td>
        <td class="muted" style="font-family:monospace">${esc(c.nro) || "—"}</td><td>${esc(c.beneficiario)}</td>
        <td class="num" style="font-weight:600;color:${esRecibido ? 'var(--success)' : 'var(--danger)'}">${esRecibido ? "+" : "−"}${fmt(c.importe)}</td>
        <td>${c.estado === "pendiente" ? `<span class="badge" style="background:var(--warning)22;color:var(--warning)">Pendiente</span>` : `<span class="badge" style="background:var(--muted)22;color:var(--muted)">${esRecibido ? "Acreditado" : "Pagado"}</span>`}</td>
      </tr>`).join("")}
      </tbody></table></div>`;

  return `
    <div class="toolbar"><div><h2>Cheques y saldo del banco</h2><div class="sub">Saldo real + cheques propios (salen) y recibidos (entran). Tildá cada uno cuando se debita o acredita.</div></div>
      <button class="btn" onclick="setSaldoBanco()">Actualizar saldo real</button></div>
    ${alerta}
    <div class="stats" style="margin-bottom:20px">
      <div class="stat"><div class="lbl">Saldo real banco</div><div class="val">${fmt(real)}</div><div class="sub">${d.saldoBancoFecha ? "al " + fmtF(d.saldoBancoFecha) : "sin cargar"}</div></div>
      <div class="stat"><div class="lbl">Propios pendientes</div><div class="val" style="color:var(--danger)">−${fmt(totalEmit)}</div><div class="sub">${chequesEmitidosPend().length} cheques salen</div></div>
      <div class="stat"><div class="lbl">Recibidos pendientes</div><div class="val" style="color:var(--success)">+${fmt(totalReci)}</div><div class="sub">${chequesRecibidosPend().length} cheques entran</div></div>
      <div class="stat"><div class="lbl">Saldo proyectado</div><div class="val" style="color:${proy >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(proy)}</div><div class="sub">real − propios + recibidos</div></div>
    </div>

    <div class="panel" style="overflow:hidden;margin-bottom:20px">

// VISTA: PROVEEDORES (cuenta por proveedor: total facturado + saldo a pagar)
// ════════════════════════════════════════════════════════════════════════
function viewProveedores() {
  const d = DB.get();
  // agrupar por proveedor: entran los egresos de tipo Proveedores / Bienes de Uso
  // con proveedor cargado, más cualquier otro egreso que tenga saldo pendiente
  const porProv = {};
  d.gastos.forEach(g => {
    const esProveedor = (g.tipo === "Proveedores" || g.tipo === "Bienes de Uso");
    if (!esProveedor && pendienteDe(g) <= 0) return;
    const k = g.proveedor || "Sin nombre";
    (porProv[k] = porProv[k] || []).push(g);
  });
  const provs = Object.keys(porProv).map(nombre => {
    const items = porProv[nombre].sort((a, b) => (a.fecha || "").localeCompare(b.fecha || ""));
    return { nombre, items, total: items.reduce((a, g) => a + g.importe, 0), pendiente: items.reduce((a, g) => a + pendienteDe(g), 0) };
  }).sort((a, b) => b.pendiente - a.pendiente || b.total - a.total);
  const totalDeuda = deudaProveedores();
  const conDeuda = provs.filter(p => p.pendiente > 0).length;
  const factPend = d.gastos.filter(g => pendienteDe(g) > 0).length;
  return `
    <div class="toolbar"><div><h2>Proveedores</h2><div class="sub">Cuenta de cada proveedor: total facturado y saldo a pagar en cuenta corriente. Los pendientes se saldan desde acá o desde Egresos.</div></div></div>
    <div class="stats">
      <div class="stat"><div class="lbl">Deuda total (cta cte)</div><div class="val" style="color:${totalDeuda > 0 ? 'var(--warning)' : 'var(--muted)'}">${fmt(totalDeuda)}</div><div class="sub">${conDeuda} proveedores con deuda</div></div>
      <div class="stat"><div class="lbl">Facturas pendientes</div><div class="val">${factPend}</div></div>
      <div class="stat"><div class="lbl">Proveedores con cuenta</div><div class="val">${provs.length}</div></div>
    </div>
    ${provs.length === 0 ? `<div class="panel"><div class="empty">Todavía no hay movimientos de proveedores.</div></div>` :
    provs.map(p => `<div class="panel" style="overflow:hidden;margin-bottom:14px">
      <div style="padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-weight:700">${esc(p.nombre)}</span>
        <span style="display:flex;gap:18px;font-size:13px;align-items:center">
          <span class="muted">Total facturado: <b style="color:var(--text)">${fmt(p.total)}</b></span>
          <span class="muted">Saldo a pagar: <b style="color:${p.pendiente > 0 ? 'var(--warning)' : 'var(--success)'}">${p.pendiente > 0 ? fmt(p.pendiente) : fmt(0) + " ✓"}</b></span>
        </span>
      </div>
      <div style="overflow-x:auto"><table><thead><tr><th>Fecha</th><th>Concepto</th><th>C. costo</th><th class="num">Importe</th><th class="num">Pendiente</th><th>Estado</th></tr></thead><tbody>
      ${p.items.map(g => { const pd = pendienteDe(g); return `<tr>
        <td style="white-space:nowrap">${fmtF(g.fecha)}</td>
        <td class="muted">${esc(g.concepto) || (g.bien ? "🚜 " + esc(g.bien.descripcion) : "—")}${(g.facturaTipo || g.facturaNro) ? `<div class="muted" style="font-size:11px">Fc ${esc(g.facturaTipo)} ${esc(g.facturaNro)}</div>` : ""}</td>
        <td class="muted">${proyectoLabel(g.proyecto)}</td>
        <td class="num" style="font-weight:600">${fmt(g.importe)}</td>
        <td class="num" style="font-weight:600;color:${pd > 0 ? 'var(--warning)' : 'var(--muted)'}">${pd > 0 ? fmt(pd) : "—"}</td>
        <td>${pd > 0 ? `<button class="btn-success btn btn-sm" onclick="openSaldarModal('${g.id}')">Saldar →</button>` : `<span class="badge" style="background:var(--success)22;color:var(--success)">Pagado</span>`}</td>
      </tr>`; }).join("")}
      </tbody><tfoot><tr><td colspan="3" style="font-weight:700">Totales de ${esc(p.nombre)}</td><td class="num" style="font-weight:700">${fmt(p.total)}</td><td class="num" style="font-weight:700;color:${p.pendiente > 0 ? 'var(--warning)' : 'var(--success)'}">${p.pendiente > 0 ? fmt(p.pendiente) : "—"}</td><td></td></tr></tfoot></table></div>
    </div>`).join("")}`;
}

// VISTA: RESUMEN POR CENTRO DE COSTO
// ════════════════════════════════════════════════════════════════════════
function viewCCosto() {
  const d = DB.get();
  const acc = {};
  const de = k => { k = k || "General"; if (!acc[k]) acc[k] = { ing: 0, egr: 0 }; return acc[k]; };
  d.ingresos.forEach(i => { de(i.proyecto).ing += i.importe; });
  d.gastos.forEach(g => { de(g.proyecto).egr += g.importe; });
  centrosCosto().forEach(c => de(c)); // que aparezcan todos aunque no tengan movimientos
  const rows = Object.keys(acc).map(k => ({ nombre: k, ing: acc[k].ing, egr: acc[k].egr, res: acc[k].ing - acc[k].egr }))
    .sort((a, b) => (b.ing + b.egr) - (a.ing + a.egr));
  const tIng = rows.reduce((a, r) => a + r.ing, 0), tEgr = rows.reduce((a, r) => a + r.egr, 0);
  const res = tIng - tEgr;
  return `
    <div class="toolbar"><div><h2>Resumen por centro de costo</h2><div class="sub">Ingresos y egresos imputados a cada obra. Resultado = ingresos − egresos.</div></div></div>
    <div class="stats">
      <div class="stat"><div class="lbl">Ingresos totales</div><div class="val" style="color:var(--success)">${fmt(tIng)}</div></div>
      <div class="stat"><div class="lbl">Egresos totales</div><div class="val" style="color:var(--danger)">${fmt(tEgr)}</div></div>
      <div class="stat"><div class="lbl">Resultado</div><div class="val" style="color:${res >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(res)}</div></div>
    </div>
    <div class="panel" style="overflow:hidden">
      ${rows.length === 0 ? `<div class="empty">Sin movimientos todavía.</div>` :
      `<div style="overflow-x:auto"><table><thead><tr><th>Centro de costo</th><th class="num">Ingresos</th><th class="num">Egresos</th><th class="num">Resultado</th></tr></thead><tbody>
      ${rows.map(r => `<tr>
        <td style="font-weight:600">${esc(r.nombre)}</td>
        <td class="num" style="color:var(--success)">${r.ing ? "+" + fmt(r.ing) : "—"}</td>
        <td class="num" style="color:var(--danger)">${r.egr ? "−" + fmt(r.egr) : "—"}</td>
        <td class="num" style="font-weight:700;color:${r.res >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(r.res)}</td>
      </tr>`).join("")}
      </tbody><tfoot><tr><td style="font-weight:700;color:var(--accent)">TOTAL</td><td class="num" style="font-weight:700;color:var(--success)">+${fmt(tIng)}</td><td class="num" style="font-weight:700;color:var(--danger)">−${fmt(tEgr)}</td><td class="num" style="font-weight:700;color:${res >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(res)}</td></tr></tfoot></table></div>`}
    </div>`;
}

// Cobrar la parte pendiente de una cobranza
function openCobrarModal(id) {
  const i = DB.get().ingresos.find(x => x.id === id); if (!i) return;
  const pend = i.montoPendiente || 0;
  window._cobrarId = id; chequesTemp = [];
  modalHTML(`
    <p class="muted" style="font-size:13px;margin-bottom:14px">Cobrar lo pendiente de <b>${esc(i.cliente || "")}</b> — ${fmt(pend)}. ¿Cómo lo cobrás?</p>
    <div class="field"><label class="field-lbl">Forma de cobro</label><select id="co_forma" onchange="coFormaChange()">
      <option value="efectivo">Efectivo (caja)</option><option value="transferencia">Transferencia (banco)</option><option value="echeque">E-cheque recibido</option></select></div>
    <div class="field"><label class="field-lbl">Fecha</label><input id="co_fecha" type="date" value="${today()}"></div>
    <div id="co_extra"></div>
  `, "Cobrar", "confirmCobrar('" + id + "')");
  coFormaChange();
}
function coFormaChange() {
  const f = document.getElementById("co_forma").value;
  const ex = document.getElementById("co_extra");
  if (f === "echeque") { chequesTemp = []; ex.innerHTML = chequesPanelHTML("co"); window._saldarImporte = (DB.get().ingresos.find(x => x.id === window._cobrarId) || {}).montoPendiente || 0; renderChequesTemp("co"); }
  else ex.innerHTML = "";
}
function confirmCobrar(id) {
  const i = DB.get().ingresos.find(x => x.id === id); if (!i) return;
  const forma = document.getElementById("co_forma").value;
  const fecha = document.getElementById("co_fecha").value;
  const pend = i.montoPendiente || 0;
  // reemplazar la línea ctacte por la forma cobrada
  let cobros = (i.cobros || []).filter(c => c.forma !== "ctacte");
  if (forma === "echeque") {
    if (chequesTemp.length === 0) { alert("Agregá al menos un e-cheque."); return; }
    const tot = chequesTemp.reduce((a, c) => a + c.importe, 0);
    cobros.push({ forma: "echeque", importe: tot });
    // generar cheques RECIBIDOS en la pestaña Cheques
    chequesTemp.forEach(c => DB.add("cheques", { tipo: "recibido", fechaEmision: fecha, fechaPago: c.fechaPago, nro: c.nro, beneficiario: i.cliente || "Cliente", importe: c.importe, refIngreso: id, estado: "pendiente" }));
  } else {
    cobros.push({ forma, importe: pend });
  }
  DB.update("ingresos", id, { cobros, estado: "cobrado", montoPendiente: 0, destino: cobros.some(c => c.forma === "efectivo") ? "caja" : "banco" });
  chequesTemp = []; window._cobrarId = null;
  closeModal(); render();
}
function openClienteDetalle(nombre) {
  const d = DB.get();
  const movs = d.ingresos.filter(i => i.tipo === "Cobranzas" && i.cliente === nombre).sort((a, b) => (b.fecha || "").localeCompare(a.fecha || ""));
  const r = clienteResumen(nombre);
  const cuerpo = `
    <div class="stats" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
      <div class="stat" style="padding:12px 14px"><div class="lbl">Facturado total</div><div class="val" style="font-size:17px">${fmt(r.facturado)}</div></div>
      <div class="stat" style="padding:12px 14px"><div class="lbl">Pendiente de cobro</div><div class="val" style="font-size:17px;color:${r.pendiente > 0 ? 'var(--warning)' : 'var(--success)'}">${fmt(r.pendiente)}</div></div>
    </div>
    ${movs.length === 0 ? `<div class="empty">Sin facturas.</div>` :
    `<div style="max-height:320px;overflow:auto;border:1px solid var(--border);border-radius:6px">
      <table><thead><tr><th>Fecha</th><th>Factura</th><th class="num">Importe</th><th>Estado</th></tr></thead><tbody>
      ${movs.map(i => `<tr>
        <td style="white-space:nowrap">${fmtF(i.fecha)}</td>
        <td class="muted">${(i.facturaTipo || i.facturaNro) ? "Fc " + esc(i.facturaTipo) + " " + esc(i.facturaNro) : esc(i.detalle || "—")}</td>
        <td class="num" style="font-weight:600">${fmt(i.importe)}</td>
        <td>${i.estado === "pendiente" ? `<span class="badge" style="background:var(--warning)22;color:var(--warning)">Debe ${fmt(i.montoPendiente || 0)}</span>` : `<span class="badge" style="background:var(--success)22;color:var(--success)">Cobrado</span>`}</td>
      </tr>`).join("")}
      </tbody></table>
    </div>`}`;
  modalHTML(cuerpo, "Cuenta de " + nombre, null);
}

function viewSocios() {
  const d = DB.get();
  const resumenes = SOCIOS.map(s => ({ nombre: s, ...socioResumen(s) }));

  return `

// Detalle de un socio: todos sus movimientos con fecha
function openSocioDetalle(nombre) {
  const d = DB.get();
  const movs = [];
  d.ingresos.forEach(i => { if (i.tipo === "Aportes Socios" && i.socio === nombre) movs.push({ fecha: i.fecha, clase: "Aporte", via: viaIngreso(i), detalle: i.detalle, importe: i.importe }); });
  d.gastos.forEach(g => { if (g.tipo === "Retiros" && g.socio === nombre) { const formas = (g.pagos && g.pagos.length) ? g.pagos.map(p => p.forma) : [g.forma]; const via = formas.map(f => f === "efectivo" ? "Caja" : f === "transferencia" ? "Banco" : f === "echeque" ? "E-cheque" : f === "ctacte" ? "Pendiente" : f).join(", "); movs.push({ fecha: g.fecha, clase: "Retiro", via, detalle: g.concepto, importe: -g.importe }); } });
  movs.sort((a, b) => (b.fecha || "").localeCompare(a.fecha || ""));
  const r = socioResumen(nombre);
  const cuerpo = `
    <div class="stats" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:16px">
      <div class="stat" style="padding:12px 14px"><div class="lbl">Aportes</div><div class="val" style="font-size:17px;color:var(--success)">${fmt(r.aportes)}</div></div>
      <div class="stat" style="padding:12px 14px"><div class="lbl">Retiros</div><div class="val" style="font-size:17px;color:var(--danger)">${fmt(r.retiros)}</div></div>
      <div class="stat" style="padding:12px 14px"><div class="lbl">Neto</div><div class="val" style="font-size:17px;color:${r.neto >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(r.neto)}</div></div>
    </div>
    ${movs.length === 0 ? `<div class="empty">Este socio todavía no tiene movimientos.</div>` :
    `<div style="max-height:320px;overflow:auto;border:1px solid var(--border);border-radius:6px">
      <table><thead><tr><th>Fecha</th><th>Tipo</th><th>Vía</th><th class="num">Importe</th></tr></thead><tbody>
      ${movs.map(m => `<tr>
        <td style="white-space:nowrap">${fmtF(m.fecha)}</td>
        <td><span class="badge" style="background:${m.clase === "Aporte" ? "var(--success)" : "var(--danger)"}22;color:${m.clase === "Aporte" ? "var(--success)" : "var(--danger)"}">${m.clase}</span></td>
        <td class="muted">${esc(m.via)}</td>
        <td class="num" style="font-weight:600;color:${m.importe >= 0 ? 'var(--success)' : 'var(--danger)'}">${m.importe >= 0 ? "+" : "−"}${fmt(Math.abs(m.importe))}</td>
      </tr>`).join("")}

    </div>`}`;
  modalHTML(cuerpo, "Cuenta de " + nombre, null);
}

const CLASIFICACION_BANCO = {
  '500.0':  'Gastos bancarios',
  '211.0':  'Gastos bancarios',
  '560.0':  'Gastos bancarios',
  '7470.0': 'Gastos bancarios',
  'ASSJU':  'Gastos bancarios',
  'SESJU':  'Gastos bancarios',
  '518.0':  'Gastos bancarios',
  '16786.0':'Gastos bancarios',
  'IDCC1':  'Imp. Ley 25.413',
  'IDCC3':  'Imp. Ley 25.413',
  'IVA08':  'IVA CF',
  'IVA09':  'IVA CF',
  'IVAA1':  'IVA CF',
  'SCE11':  'Retenciones de IVA',
};
const MESES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                  'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const CODS_AGRUP = new Set(Object.keys(CLASIFICACION_BANCO));

// Estado del importador banco (en memoria, se resetea si se importa otro XLS)
let _bancMovs     = [];   // movimientos del extracto actual
let _bancAgrup    = [];   // meses agrupados [{mes_key,nombre,fecha_ultimo,cuentas,total,confirmado}]
let _bancOtros    = [];   // movimientos no agrupados
let _bancDec      = {};   // id -> {tipo,cuenta,proyecto,importe,detalle}
let _bancImportado = false;

// ═══ PARSEAR XLS (SheetJS ya incluido en la app) ═══
function bancHandleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      bancParsear(rows);
    } catch(err) { alert('Error al leer el archivo: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function bancParsear(rows) {
  _bancMovs = [];
  let idx = 0;
  for (const row of rows) {
    const fechaRaw = (row[1]||'').toString().trim();
    if (!fechaRaw || fechaRaw==='Fecha') continue;
    let fecha = '';
    const p = fechaRaw.split('/');
    if (p.length===3) {
      fecha = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
    } else {
      const num = parseFloat(fechaRaw);
      if (!isNaN(num)) {
        const d = XLSX.SSF.parse_date_code(num);
        if (d) fecha = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
      }
    }
    if (!fecha) continue;
    const concepto = (row[2]||'').toString().trim();
    if (!concepto) continue;
    _bancMovs.push({
      id:'b'+idx++, fecha, concepto,
      nro:(row[3]||'').toString().trim(),
      debito:parseFloat(row[4])||0,
      credito:parseFloat(row[5])||0,
      saldo:parseFloat(row[6])||0,
      cod:(()=>{ const r=(row[7]||'').toString().trim(); const n=parseFloat(r); return (!isNaN(n)&&r===String(n))?r+'.0':r; })(),
    });
  }
  _bancDec = {};
  bancAgrupar();
  _bancImportado = true;
  renderTabContent(); // refrescar pestaña banco
}

function bancAgrupar() {
  const acum = {};
  _bancOtros = [];
  for (const m of _bancMovs) {
    const cuenta = CLASIFICACION_BANCO[m.cod];
    if (cuenta) {
      const mk = m.fecha.slice(0,7);
      if (!acum[mk]) acum[mk] = {};
      acum[mk][cuenta] = (acum[mk][cuenta]||0) + m.debito - m.credito;
    } else {
      _bancOtros.push({...m});
    }
  }
  _bancAgrup = [];
  for (const mk of Object.keys(acum).sort()) {
    const [anio,mesN] = mk.split('-');
    const nombre = MESES_ES[parseInt(mesN)-1]+' '+anio;
    const ultimoDia = new Date(parseInt(anio),parseInt(mesN),0).getDate();
    const fecha_ultimo = `${anio}-${mesN}-${String(ultimoDia).padStart(2,'0')}`;
    const cuentas = Object.entries(acum[mk])
      .map(([c,n])=>({cuenta:c,monto:Math.round(n*100)/100,proyecto:'General'}))
      .filter(c=>c.monto>0.01)
      .sort((a,b)=>a.cuenta.localeCompare(b.cuenta));
    if (!cuentas.length) continue;
    _bancAgrup.push({mes_key:mk,nombre,fecha_ultimo,cuentas,total:cuentas.reduce((a,c)=>a+c.monto,0),confirmado:false});
  }
}

                ? `<button class="btn-danger btn btn-sm" onclick="bancAbrirDec('${m.id}','egreso',${monto})">📤 Egreso</button>`
                : `<button class="btn-success btn btn-sm" onclick="bancAbrirDec('${m.id}','ingreso',${monto})">📥 Ingreso</button>`}
              <button class="btn-ghost btn btn-sm" onclick="bancIgnorar('${m.id}')">Ignorar</button>
            </div>`}
      </td>
    </tr>`;
  }).join('');
  return `<div class="panel" style="overflow:hidden">
    <div class="panel-head">
      <span>Transferencias y otros sin clasificación automática</span>
      <span class="badge" style="background:${sinDec?'#2a2010':'#16321f'};color:${sinDec?'#d4a017':'#4caf7d'}">${_bancOtros.length-sinDec}/${_bancOtros.length} clasificados</span>
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Fecha</th><th>Concepto</th><th class="num">Débito</th><th class="num">Crédito</th><th>Decisión</th></tr></thead>
      <tbody>${filas}</tbody>
    </table></div>
  </div>`;
}

function bancAbrirDec(id,tipo,monto) {
  const mov=_bancOtros.find(m=>m.id===id);
  const esE=tipo==='egreso';
  modalHTML(`
    <div style="background:#252a31;border:1px solid #333941;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px">
      <div class="muted" style="margin-bottom:4px">${esc(mov.concepto)}</div>
      <b style="color:${esE?'#e0524f':'#4caf7d'}">${fmt(monto)}</b> · ${fmtF(mov.fecha)} · ${esc(mov.cod)}
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div><div class="field-lbl">${esE?'Cuenta egreso':'Tipo ingreso'}</div>
        <select id="bdec_cuenta">
          ${(esE?tiposGasto():TIPOS_INGRESO).map(c=>`<option>${esc(c)}</option>`).join('')}
          ${esE?'<option value="__nueva__">+ Nueva cuenta…</option>':''}
        </select>
      </div>
      <div><div class="field-lbl">Centro de costo</div>
        <select id="bdec_proy">${centrosCosto().map(p=>`<option>${p}</option>`).join('')}</select>
      </div>
    </div>
    <div style="margin-bottom:12px"><div class="field-lbl">Importe ($)</div>
      <input id="bdec_imp" type="number" value="${monto}">
    </div>
    <div><div class="field-lbl">${esE?'Proveedor / detalle':'Quién / detalle'} (opcional)</div>
      <input id="bdec_det" placeholder="opcional">
    </div>
  `, `Clasificar como ${tipo}`, `bancConfirmarDec('${id}','${tipo}',${monto})`);
}

function bancConfirmarDec(id,tipo,montoOrig) {
  let cuenta=document.getElementById('bdec_cuenta').value;
  if (cuenta==='__nueva__') {
    const v=prompt('Nombre de la nueva cuenta:'); if(!v)return;
    cuenta=v.trim();
    const d=DB.get(); if(!d.tiposGasto.includes(cuenta))d.tiposGasto.push(cuenta);
  }
  _bancDec[id]={tipo,cuenta,
    proyecto:document.getElementById('bdec_proy').value,
    importe:parseFloat(document.getElementById('bdec_imp').value)||montoOrig,
    detalle:document.getElementById('bdec_det').value.trim()};
  closeModal(); renderTabContent();
}

function bancIgnorar(id) {
  _bancDec[id]={tipo:'ignorar'};
  const fila = document.getElementById('bfila_'+id);
  if (fila) {
    fila.style.opacity='.35';
    const td = fila.querySelector('td:last-child');
    if (td) td.innerHTML = `<span class="badge" style="background:#2a1a1a;color:#e0524f">Ignorado</span>
      <button class="btn-ghost btn btn-sm" style="margin-left:6px" onclick="bancResetDec('${id}')">✕</button>`;
  }
}
function bancResetDec(id) { delete _bancDec[id]; renderTabContent(); }

function bancRenderExtracto() {
  const filas=_bancMovs.map(m=>{
    const esA=CODS_AGRUP.has(m.cod);
    const dec=_bancDec[m.id];
    const est=esA?'agrupado':(dec?dec.tipo:'pendiente');
    const badges={
      agrupado:`<span class="badge" style="background:#1a2a3a;color:#5b9bd5">Agrupado</span>`,
      egreso:`<span class="badge" style="background:#16321f;color:#4caf7d">→ ${esc(dec?.cuenta||'')}</span>`,
      ingreso:`<span class="badge" style="background:#16321f;color:#4caf7d">→ ${esc(dec?.cuenta||'')}</span>`,
      ignorar:`<span class="badge" style="background:#2a1a1a;color:#e0524f">Ignorado</span>`,
      pendiente:`<span class="badge" style="background:#2a2010;color:#d4a017">Sin clasificar</span>`,
    };
    return `<tr style="${esA||est==='ignorar'?'opacity:.35':''}">
      <td style="white-space:nowrap">${fmtF(m.fecha)}</td>
      <td><div>${esc(m.concepto.substring(0,55))}</div><div class="muted" style="font-size:11px">${esc(m.cod)}</div></td>
      <td class="num" style="color:#e0524f">${m.debito>0?fmt(m.debito):'—'}</td>
      <td class="num" style="color:#4caf7d">${m.credito>0?fmt(m.credito):'—'}</td>
      <td>${badges[est]||''}</td>
    </tr>`;
  }).join('');
  return `<div class="panel" style="overflow:hidden">
    <div class="panel-head"><span>Extracto completo — ${_bancMovs.length} movimientos</span></div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Fecha</th><th>Concepto</th><th class="num">Débito</th><th class="num">Crédito</th><th>Estado</th></tr></thead>
      <tbody>${filas}</tbody>
    </table></div>
  </div>`;
}

// ═══ REGISTRAR TODO EN EGRESOS ═══
function bancRegistrarTodo() {
  const confAgrup=_bancAgrup.filter(m=>m.confirmado);
  const confDec=_bancOtros.filter(m=>_bancDec[m.id]&&_bancDec[m.id].tipo!=='ignorar');
  const total=confAgrup.reduce((a,m)=>a+m.cuentas.length,0)+confDec.length;

  if (!total) { alert('No hay nada confirmado todavía. Revisá y confirmá los meses primero.'); return; }

  let registrados=0;
  // Agrupados
  for (const mes of confAgrup) {
    for (const c of mes.cuentas) {
      DB.add('gastos',{
        fecha:mes.fecha_ultimo, tipo:c.cuenta,
        concepto:'Extracto banco '+mes.nombre,
        proyecto:c.proyecto, importe:c.monto,
        pagos:[{forma:'transferencia',importe:c.monto}],
        estado:'pagado', montoPendiente:0, origen:'banco'
      });
      registrados++;
    }
    mes.confirmado=false; mes._registrado=true;
  }
  // Decisiones manuales
  for (const mov of _bancOtros) {
    const dec=_bancDec[mov.id];
    if (!dec||dec.tipo==='ignorar') continue;
    if (dec.tipo==='egreso') {
      DB.add('gastos',{
        fecha:mov.fecha, tipo:dec.cuenta, proveedor:dec.detalle||'',
        concepto:'Extracto banco '+mov.fecha.slice(0,7),
        proyecto:dec.proyecto, importe:dec.importe,
        pagos:[{forma:'transferencia',importe:dec.importe}],
        estado:'pagado', montoPendiente:0, origen:'banco'
      });
    } else {
      DB.add('ingresos',{
        fecha:mov.fecha, tipo:dec.tipo, detalle:dec.detalle||'',
        proyecto:dec.proyecto, importe:dec.importe,
        cobros:[{forma:'transferencia',importe:dec.importe}],
        estado:'cobrado', montoPendiente:0, destino:'banco'
      });
    }
    registrados++;
  }
  _bancDec={};

  modalHTML(`
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:36px;margin-bottom:12px">✅</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:8px">${registrados} registros creados</div>
      <div class="muted" style="font-size:13px;margin-bottom:20px">Podés verlos en la pestaña <b>Egresos</b> ahora.</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn-ghost btn btn-sm" onclick="closeModal()">Quedarme acá</button>
        <button class="btn btn-sm" onclick="closeModal();go('gastos')">Ver Egresos →</button>
      </div>
    </div>
  `, '');
}

</script>
